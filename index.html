<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FitTimer - Workout Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>FitTimer</h1>
            </div>
            <p class="tagline">Il tuo coach personale</p>
        </header>
        
        <main class="workout-cards-container">
            <h2 class="section-title">Scegli la tua scheda</h2>
            <div class="workout-cards" id="workout-cards">
                <!-- Cards will be generated by JS -->
            </div>
        </main>
    </div>

    <!-- Preview Screen -->
    <div id="preview-screen" class="screen">
        <header class="screen-header">
            <button class="back-btn" id="back-to-home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h2 id="preview-title">Scheda</h2>
            <div class="spacer"></div>
        </header>
        
        <main class="preview-content">
            <div class="workout-info" id="workout-info">
                <!-- Info will be generated by JS -->
            </div>
            
            <div class="exercise-list" id="exercise-list">
                <!-- Exercises will be generated by JS -->
            </div>
            
            <button class="start-btn" id="start-workout">
                <span class="btn-icon">▶</span>
                Inizia Allenamento
            </button>
        </main>
    </div>

    <!-- Workout Screen -->
    <div id="workout-screen" class="screen">
        <header class="workout-header">
            <button class="quit-btn" id="quit-workout">✕</button>
            <div class="progress-info">
                <span id="current-exercise-num">1</span>
                <span class="separator">/</span>
                <span id="total-exercises">6</span>
            </div>
        </header>

        <main class="workout-content">
            <div class="timer-ring" id="timer-ring">
                <svg viewBox="0 0 200 200">
                    <circle class="timer-bg" cx="100" cy="100" r="90"/>
                    <circle class="timer-progress" id="timer-progress" cx="100" cy="100" r="90"/>
                </svg>
                <div class="timer-display">
                    <span class="timer-value" id="timer-value">00:00</span>
                    <span class="timer-label" id="timer-label">PREPARATI</span>
                </div>
            </div>

            <div class="exercise-info-panel">
                <h2 class="current-exercise-name" id="current-exercise-name">Esercizio</h2>
                <p class="current-exercise-details" id="current-exercise-details">Dettagli</p>
            </div>

            <div class="tips-panel" id="tips-panel">
                <div class="tip-header">
                    <span class="tip-icon">💡</span>
                    <span>Consiglio</span>
                </div>
                <p class="tip-text" id="tip-text">Consiglio di esecuzione</p>
            </div>

            <div class="next-exercise-panel" id="next-panel">
                <span class="next-label">Prossimo:</span>
                <span class="next-name" id="next-exercise-name">-</span>
            </div>
        </main>

        <footer class="workout-controls">
            <button class="control-btn secondary" id="prev-exercise">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                </svg>
            </button>
            <button class="control-btn primary" id="pause-resume">
                <svg class="pause-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
                <svg class="play-icon hidden" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </button>
            <button class="control-btn secondary" id="next-exercise">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
            </button>
        </footer>
    </div>

    <!-- Complete Screen -->
    <div id="complete-screen" class="screen">
        <div class="complete-content">
            <div class="complete-icon">🎉</div>
            <h1 class="complete-title">Allenamento Completato!</h1>
            <div class="complete-stats" id="complete-stats">
                <!-- Stats will be generated by JS -->
            </div>
            <button class="start-btn" id="back-home">
                <span class="btn-icon">🏠</span>
                Torna alla Home
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
